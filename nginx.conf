# Serve the static site + 301 www.omarcrosby.com → omarcrosby.com.
# Fly terminates TLS at its edge and forwards to :8080; we do not listen on 443 here.

# Redirect www to apex. Any host that isn't the apex hits the default_server below.
server {
    listen 8080;
    server_name www.omarcrosby.com;
    return 301 https://omarcrosby.com$request_uri;
}

server {
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hugo emits pretty URLs as directories; also try .html for un-prettied paths.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Default cache policy — 5-minute TTL applied to any response that
    # doesn't hit a more-specific location block below. In practice this
    # is HTML (both pretty-URL / and un-prettied .html), RSS/JSON feeds,
    # robots.txt, sitemap.xml — anything the browser would otherwise
    # cache at its own discretion because we set no header. Short window
    # keeps in-session repeat visits snappy without holding stale content
    # past ~5 minutes after a deploy. `expires` sets both Expires and
    # Cache-Control (max-age).
    expires 5m;

    # Fingerprinted Hugo assets can be cached aggressively. `expires 30d`
    # here overrides the server-level 5m default; add_header layers
    # `immutable` so browsers skip revalidation entirely — safe because
    # the filenames are content-hashed and change on every rebuild.
    location ~* \.(css|js|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/javascript application/json application/xml application/rss+xml image/svg+xml;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options SAMEORIGIN always;
}
