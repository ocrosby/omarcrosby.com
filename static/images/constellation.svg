<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 100" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Constellation of connected nodes">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g stroke="#5eead4" stroke-width="0.7" stroke-opacity="0.32">
    <line x1="80"   y1="45" x2="200"  y2="70"/>
    <line x1="200"  y1="70" x2="320"  y2="30"/>
    <line x1="320"  y1="30" x2="440"  y2="55"/>
    <line x1="320"  y1="30" x2="560"  y2="25"/>
    <line x1="440"  y1="55" x2="680"  y2="60"/>
    <line x1="560"  y1="25" x2="680"  y2="60"/>
    <line x1="680"  y1="60" x2="800"  y2="35"/>
    <line x1="800"  y1="35" x2="920"  y2="65"/>
    <line x1="800"  y1="35" x2="1040" y2="40"/>
    <line x1="920"  y1="65" x2="1040" y2="40"/>
    <line x1="1040" y1="40" x2="1140" y2="55"/>
  </g>
  <g>
    <circle cx="80"   cy="45" r="2.2" fill="#94a3b8" opacity="0.75"/>
    <circle cx="200"  cy="70" r="2.2" fill="#94a3b8" opacity="0.75"/>
    <circle cx="320"  cy="30" r="4.5" fill="#5eead4" filter="url(#glow)"/>
    <circle cx="440"  cy="55" r="2.2" fill="#94a3b8" opacity="0.75"/>
    <circle cx="560"  cy="25" r="2.2" fill="#94a3b8" opacity="0.75"/>
    <circle cx="680"  cy="60" r="5"   fill="#5eead4" filter="url(#glow)"/>
    <circle cx="800"  cy="35" r="2.2" fill="#94a3b8" opacity="0.75"/>
    <circle cx="920"  cy="65" r="2.2" fill="#94a3b8" opacity="0.75"/>
    <circle cx="1040" cy="40" r="4.5" fill="#5eead4" filter="url(#glow)"/>
    <circle cx="1140" cy="55" r="2.2" fill="#94a3b8" opacity="0.75"/>
  </g>
</svg>
