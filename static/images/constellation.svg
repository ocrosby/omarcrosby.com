<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Constellation of connected nodes">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient background stars (very low opacity, decorative texture) -->
  <g fill="#94a3b8" opacity="0.25">
    <circle cx="60"   cy="130" r="1"/>
    <circle cx="150"  cy="330" r="1"/>
    <circle cx="240"  cy="100" r="1"/>
    <circle cx="330"  cy="220" r="1"/>
    <circle cx="500"  cy="120" r="1"/>
    <circle cx="560"  cy="290" r="1"/>
    <circle cx="720"  cy="60"  r="1"/>
    <circle cx="880"  cy="360" r="1"/>
    <circle cx="1000" cy="140" r="1"/>
    <circle cx="1160" cy="240" r="1"/>
  </g>

  <!-- Connecting lines -->
  <g stroke="#5eead4" stroke-width="1" stroke-opacity="0.3">
    <line x1="100"  y1="70"  x2="370"  y2="130"/>
    <line x1="200"  y1="200" x2="370"  y2="130"/>
    <line x1="200"  y1="200" x2="440"  y2="260"/>
    <line x1="280"  y1="340" x2="440"  y2="260"/>
    <line x1="370"  y1="130" x2="520"  y2="60"/>
    <line x1="370"  y1="130" x2="600"  y2="200"/>
    <line x1="440"  y1="260" x2="600"  y2="200"/>
    <line x1="520"  y1="60"  x2="600"  y2="200"/>
    <line x1="600"  y1="200" x2="700"  y2="350"/>
    <line x1="600"  y1="200" x2="770"  y2="120"/>
    <line x1="700"  y1="350" x2="840"  y2="250"/>
    <line x1="770"  y1="120" x2="840"  y2="250"/>
    <line x1="840"  y1="250" x2="930"  y2="60"/>
    <line x1="840"  y1="250" x2="1000" y2="190"/>
    <line x1="930"  y1="60"  x2="1000" y2="190"/>
    <line x1="1000" y1="190" x2="1080" y2="320"/>
    <line x1="1000" y1="190" x2="1150" y2="100"/>
    <line x1="1080" y1="320" x2="1150" y2="100"/>
  </g>

  <!-- Slate anchor nodes -->
  <g fill="#94a3b8" opacity="0.75">
    <circle cx="100"  cy="70"  r="3"/>
    <circle cx="200"  cy="200" r="3"/>
    <circle cx="280"  cy="340" r="3"/>
    <circle cx="440"  cy="260" r="3"/>
    <circle cx="520"  cy="60"  r="3"/>
    <circle cx="700"  cy="350" r="3"/>
    <circle cx="770"  cy="120" r="3"/>
    <circle cx="930"  cy="60"  r="3"/>
    <circle cx="1000" cy="190" r="3"/>
    <circle cx="1150" cy="100" r="3"/>
  </g>

  <!-- Teal highlighted nodes with soft glow -->
  <g fill="#5eead4">
    <circle cx="370"  cy="130" r="6" filter="url(#glow)"/>
    <circle cx="600"  cy="200" r="7" filter="url(#glow)"/>
    <circle cx="840"  cy="250" r="6" filter="url(#glow)"/>
    <circle cx="1080" cy="320" r="6" filter="url(#glow)"/>
  </g>
</svg>
