name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.detect.outputs.released }}
      tag: ${{ steps.detect.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name  "semantic-release-bot"
          git config user.email "semantic-release-bot@users.noreply.github.com"

      - name: Run semantic-release
        # Inlined instead of `uses: jedi-knights/go-semantic-release@v0.10.2`
        # for two reasons:
        #   1. The tool's internal GitHub Release publisher 404s on this
        #      repo shape (known upstream limitation). The tag still gets
        #      pushed reliably. We swallow the non-zero exit here so the
        #      job runs clean without an `##[error]` annotation; the
        #      `Ensure GitHub Release exists` step below creates the
        #      Release from the pushed tag.
        #   2. Pins a SHA-256 checksum on the binary download (OWASP A03)
        #      which the upstream composite action doesn't do.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SR_VERSION: v0.10.2
          SR_SHA256: bb2190304676f4824e2e7a4671358bc5e758e6db0501bc9e5df11808c4a22a1b
        run: |
          set -euo pipefail
          ARCHIVE="semantic-release_${SR_VERSION#v}_linux_amd64.tar.gz"
          URL="https://github.com/jedi-knights/go-semantic-release/releases/download/${SR_VERSION}/${ARCHIVE}"
          curl -fsSL "$URL" -o "$RUNNER_TEMP/$ARCHIVE"
          echo "$SR_SHA256  $RUNNER_TEMP/$ARCHIVE" | sha256sum -c -
          tar -xz -C "$RUNNER_TEMP" -f "$RUNNER_TEMP/$ARCHIVE" semantic-release
          if "$RUNNER_TEMP/semantic-release"; then
            echo "semantic-release completed cleanly."
          else
            echo "::notice::semantic-release exited non-zero — expected on this repo shape (publish step 404). Tag was still pushed; fallback step will create the GitHub Release."
          fi

      - name: Detect new tag on HEAD
        id: detect
        shell: bash
        run: |
          git fetch --tags --force
          TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -n1 || true)
          if [ -n "$TAG" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG"      >> "$GITHUB_OUTPUT"
            echo "Detected new release tag: $TAG"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "No new tag on HEAD — nothing to release."
          fi

      - name: Ensure GitHub Release exists
        if: steps.detect.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.detect.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
          else
            gh release create "$TAG" --generate-notes --verify-tag --title "$TAG"
          fi

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    concurrency:
      group: fly-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.release.outputs.tag }}
          submodules: recursive
          fetch-depth: 1

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
