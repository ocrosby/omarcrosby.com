name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.detect.outputs.released }}
      tag: ${{ steps.detect.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name  "semantic-release-bot"
          git config user.email "semantic-release-bot@users.noreply.github.com"

      - name: Run semantic-release
        # The tool tags reliably but its internal GitHub Release publisher
        # 404s on this repo shape. Tolerate that — the fallback step below
        # creates the Release from the pushed tag.
        continue-on-error: true
        uses: jedi-knights/go-semantic-release@v0.10.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect new tag on HEAD
        id: detect
        shell: bash
        run: |
          git fetch --tags --force
          TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -n1 || true)
          if [ -n "$TAG" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG"      >> "$GITHUB_OUTPUT"
            echo "Detected new release tag: $TAG"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "No new tag on HEAD — nothing to release."
          fi

      - name: Ensure GitHub Release exists
        if: steps.detect.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.detect.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
          else
            gh release create "$TAG" --generate-notes --verify-tag --title "$TAG"
          fi

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    concurrency:
      group: fly-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
          submodules: recursive
          fetch-depth: 1

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
