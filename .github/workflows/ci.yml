name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Hugo build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.160.1'
          extended: true

      - name: Build site
        run: hugo --minify --gc

      - uses: actions/upload-artifact@v4
        with:
          name: public
          path: public/
          retention-days: 1

  links:
    name: Broken link check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: public
          path: public/

      - uses: lycheeverse/lychee-action@v2
        with:
          # --base resolves root-relative hrefs (e.g. "/css/bootstrap.min.css").
          # Accept list rationale:
          #   200/203/204/206 — normal success responses (206 = partial content).
          #   202 Accepted — the request landed but processing is queued; the URL is real.
          #     Some sites behind bot-management (e.g. agilealliance.org) reply 202 to lychee.
          #   999 — LinkedIn's bot-detection response; treat as "URL exists".
          args: --no-progress --base https://omarcrosby.com --accept 200,202,203,204,206,999 --exclude-file .lycheeignore './public/**/*.html'
          fail: true

  markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md
            !CHANGELOG.md
            !themes/**
            !public/**
            !resources/**
            !node_modules/**

  typos:
    name: Typo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@v1.29.4
