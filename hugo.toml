baseURL = "https://omarcrosby.com/"
languageCode = "en-us"
defaultContentLanguage = "en"
title = "Omar Crosby"
theme = "PaperMod"

enableRobotsTXT = true
enableEmoji = true
buildDrafts = false
buildFuture = false
buildExpired = false

# Pretty section pagination (Hugo 0.128+ modern form).
[pagination]
  pagerSize = 5

[minify]
  disableXML = true
  minifyOutput = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

# Related content — surfaces "Related posts" widget at the end of each
# single post via layouts/_partials/extend_post_content.html. Categories
# weighted highest so posts in the same pillar cluster; tags fill in
# when categories run out. See docs.gohugo.io/methods/pages/related.
[related]
  threshold = 80
  includeNewer = true
  toLower = false

  [[related.indices]]
    name = "categories"
    weight = 100

  [[related.indices]]
    name = "tags"
    weight = 60

  [[related.indices]]
    name = "date"
    weight = 10
    pattern = "2006"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  codeFences = true
  guessSyntax = true
  lineNos = false
  noClasses = false
  style = "monokai"
  tabWidth = 2

# ---------------------------------------------------------------------------
# Menu
# ---------------------------------------------------------------------------

[[menu.main]]
  identifier = "music"
  name = "Music"
  url = "/music/"
  weight = 30

[[menu.main]]
  identifier = "recipes"
  name = "Recipes"
  url = "/recipes/"
  weight = 32

[[menu.main]]
  identifier = "posts"
  name = "Blog"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "projects"
  name = "Projects"
  url = "/projects/"
  weight = 20

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 3

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 40

# ---------------------------------------------------------------------------
# PaperMod params
# ---------------------------------------------------------------------------

[params]
  env = "production"
  title = "Omar Crosby"
  description = "Software engineer building sports-data infrastructure, distributed systems, Neovim developer tooling, and code-quality analyzers."
  keywords = ["blog", "software", "engineering", "sports data", "hugo"]
  author = "Omar Crosby"
  # Site-wide Open Graph / Twitter preview image (1200x630). Consumed by
  # Hugo's _internal/opengraph.html and _internal/twitter_cards.html via
  # site.Params.images; setting this both emits og:image on every page and
  # promotes twitter:card to summary_large_image. Generated by
  # scripts/generate-meta-og-images.py — circular headshot on the left,
  # site brand + tagline on the right. JPG (smaller than PNG for the
  # photograph content).
  images = ["images/og.jpg"]
  # Default to dark; the toggle in the header lets visitors switch to light.
  defaultTheme = "dark"
  disableThemeToggle = false

  ShowReadingTime = true
  ShowShareButtons = true
  # Explicit share-button allowlist. Omitting this key renders PaperMod's full
  # default set (adds whatsapp, telegram, ycombinator) — do not remove the key
  # without intent.
  ShareButtons = ["x", "linkedin", "reddit", "facebook"]
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  TocOpen = false
  UseHugoToc = true

  comments = false
  hidemeta = false
  hideSummary = false
  disableSpecial1stPost = false
  disableScrollToTop = false

[params.assets]
  disableHLJS = true
  favicon = "/favicon.ico"

# Analytics — GoatCounter (free for personal use, no cookies, privacy-
# respecting). Setup:
#   1. Sign up at goatcounter.com. Pick a subdomain like `omarcrosby`.
#   2. Set `code` below to that subdomain.
#   3. Merge. layouts/_partials/extend_head.html emits the script tag
#      only when hugo.IsProduction is true and code is non-empty.
#
# To switch to Plausible or Fathom later: edit the analytics block in
# layouts/_partials/extend_head.html to their snippet, still gated on
# hugo.IsProduction. Keep the "no cookies, no PII" property.
[params.goatcounter]
  code = "omarcrosby"

# Newsletter — Buttondown (developer-friendly, indie-web, free up to 100
# subscribers). Setup:
#   1. Sign up at buttondown.com. Pick a username like `omarcrosby`.
#   2. Set `username` below to that username.
#   3. Merge. The {{< newsletter-form >}} shortcode in
#      content/subscribe.md starts rendering the real form; until then
#      it renders a "coming soon" placeholder.
#
# To swap providers (Kit / MailerLite / Beehiiv / etc.), edit the form
# action URL and hidden fields inside layouts/shortcodes/newsletter-form.html
# to match their embed shape. The subscribe page copy stays put.
[params.buttondown]
  username = ""

# Persistent site-header avatar — small circular headshot next to the
# "Omar Crosby" title on every page. PaperMod's header.html reads
# label.icon (via resources.Get first, then absURL fallback), and
# renders it at label.iconHeight px. The `.logo a img` selector in
# assets/css/extended/header-avatar.css clips it to a circle.
[params.label]
  icon = "images/omar.jpg"
  iconHeight = 32

# Profile mode — landing page shows a name, tagline, and buttons instead of a post list.
[params.profileMode]
  enabled = true
  title = "Omar Crosby"
  subtitle = "Software engineer building sports-data infrastructure, distributed systems, Neovim developer tooling, and code-quality analyzers — with occasional detours into NASM and options-trading signals."
  imageTitle = "Portrait of Omar Crosby"
  # Tight face-centered 225x225 crop (from 461x463 source at offset
  # +236+155). The face fills the frame; the only edge pixels are the
  # ambient sky color (#E6E8ED) from behind the head — no pure-white
  # padding from the source's empty left half. imageWidth/imageHeight
  # are HTML attributes only — the browser uses them as an aspect-
  # ratio hint for reflow-free rendering, not as a hard size.
  # assets/css/extended/profile-hero.css constrains actual displayed
  # size (max-width 260px, border-radius 50%). The constellation SVG
  # that previously lived here is still under static/images/ if you
  # want to switch back.
  imageWidth = 225
  imageHeight = 225
  imageUrl = "images/omar.jpg"

  # URLs are rendered verbatim as `href` by PaperMod's profile template.
  # Always root-relative (leading slash) or absolute — never bare strings.
  # See .claude/rules/hugo-config-urls.md.
  [[params.profileMode.buttons]]
    name = "Blog"
    url = "/posts/"
  [[params.profileMode.buttons]]
    name = "Projects"
    url = "/projects/"
  [[params.profileMode.buttons]]
    name = "About"
    url = "/about/"

# Fallback for when profileMode is disabled — shows above the post list.
[params.homeInfoParams]
  Title = "Omar Crosby"
  Content = "Software engineer building sports-data tooling and APIs."

# Social icons rendered in the header and under profileMode buttons.
[[params.socialIcons]]
  name = "github"
  url = "https://github.com/ocrosby"

[[params.socialIcons]]
  name = "linkedin"
  url = "https://www.linkedin.com/in/omarcrosby/"

[[params.socialIcons]]
  name = "x"
  url = "https://x.com/crosbyomar"

[[params.socialIcons]]
  name = "instagram"
  url = "https://www.instagram.com/omar.crosby/"

[[params.socialIcons]]
  name = "facebook"
  url = "https://www.facebook.com/omar.crosby/"

[[params.socialIcons]]
  name = "email"
  url = "mailto:omar.crosby@gmail.com"

[[params.socialIcons]]
  name = "rss"
  url = "/index.xml"

# Search (Fuse.js) — powered by home JSON output.
[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  keys = ["title", "permalink", "summary", "content"]
