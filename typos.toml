[files]
extend-exclude = [
  "themes/",     # vendored theme, not ours to fix
  "public/",     # generated
  "resources/",  # generated
  "CHANGELOG.md",
  "data/music.yaml",           # YouTube video IDs look like typos to the checker
  "data/recipes.yaml",         # mirrors filenames + titles from ocrosby/recipes, not our copy to lint
  "scripts/backfill-genres.py", # YouTube video IDs as dict keys — same false-positive class as data/music.yaml
  "static/images/og/music/",   # per-song OG image files are named <youtube_id>.jpg — same false-positive class
]

[default]
locale = "en-us"

[default.extend-words]
# Legitimate proper nouns / project names that the default dictionary
# flags as typos. Add here (identifier form) when the checker complains
# about something that is actually spelled correctly.
noice = "noice"    # Neovim plugin name (github.com/folke/noice.nvim)
decorder = "decorder" # golangci-lint linter name (not "decoder")
importas = "importas" # golangci-lint linter name (not "imports")
womens = "womens"  # URL-safe slug form of "women's" (tags, filenames, image paths)
OT = "OT"          # opponent-ties variable in NCAA RPI opponent-side formulas (Element 2 / OWP)
BRE = "BRE"        # POSIX Basic Regular Expressions acronym (regex post)
Nd = "Nd"          # Unicode general category "Number, Decimal digit" (regex post: \p{Nd})
alog = "alog"      # substring in the "cat|catalog leaves alog unmatched" example (regex post)
